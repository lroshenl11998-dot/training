<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FBFAF7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#18181B" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Тренировки">
<title>Тренировки · Скалолазание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBFAF7;
  --surface: #FFFFFF;
  --surface-2: #F1EFE8;
  --text: #18181B;
  --text-2: #57534E;
  --text-3: #A8A29E;
  --line: rgba(0,0,0,0.08);
  --line-2: rgba(0,0,0,0.14);
  --accent: #C84B1F;
  --accent-bg: #FAECE7;
  --done: #1D9E75;
  --done-bg: #E1F5EE;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181B;
    --surface: #1F1F23;
    --surface-2: #27272A;
    --text: #FAFAF9;
    --text-2: #A8A29E;
    --text-3: #57534E;
    --line: rgba(255,255,255,0.1);
    --line-2: rgba(255,255,255,0.18);
    --accent: #F0997B;
    --accent-bg: #2A1610;
    --done: #5DCAA5;
    --done-bg: #0F2A20;
  }
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
  font-size: 15px;
  min-height: 100vh;
}
.mono { font-family: "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
.app { max-width: 720px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom); }
header {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--line);
  padding-top: env(safe-area-inset-top);
}
.top {
  padding: 12px 16px 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo { width: 36px; height: 22px; flex-shrink: 0; }
.logo path { stroke: var(--text); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.logo .peak { stroke: var(--accent); }
h1 {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  flex: 1;
}
.progress {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tabs-wrap { overflow-x: auto; padding: 0 12px 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 5px; min-width: max-content; }
.tab {
  padding: 9px 14px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  background: transparent;
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.01em;
  transition: all 0.15s;
}
.tab:active { transform: scale(0.96); }
.tab.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
main { padding: 18px 16px 32px; }
.section-head { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
.section-label { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.section-head h2 { font-size: 26px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; line-height: 1.15; }
.section-head .meta { font-size: 13px; color: var(--text-2); margin: 0; }
.section-head .meta strong { color: var(--text); font-weight: 600; }
.cards { display: flex; flex-direction: column; gap: 8px; }
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  cursor: pointer;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  transition: all 0.15s;
  position: relative;
}
.card:active { transform: scale(0.985); background: var(--surface-2); }
.card.done { background: var(--done-bg); border-color: var(--done); }
.card.done .anim { opacity: 0.55; }
.anim {
  width: 64px;
  height: 64px;
  flex-shrink: 0;
  background: var(--surface-2);
  border-radius: 8px;
  overflow: hidden;
}
.card.done .anim { background: transparent; }
.anim svg { width: 100%; height: 100%; display: block; }
.body { flex: 1; min-width: 0; }
.name { font-size: 15px; font-weight: 600; margin: 0 0 2px; line-height: 1.25; letter-spacing: -0.005em; }
.reps { font-size: 12px; color: var(--accent); font-weight: 600; margin: 0 0 3px; letter-spacing: 0.02em; }
.card.done .reps { color: var(--done); }
.tip { font-size: 12px; color: var(--text-2); margin: 0; line-height: 1.4; }
.chev { color: var(--text-3); font-size: 22px; line-height: 1; padding-left: 2px; font-weight: 300; }
.check-icon { color: var(--done); width: 22px; height: 22px; flex-shrink: 0; }

/* Detail view */
.back-btn {
  background: transparent;
  border: none;
  font: inherit;
  font-size: 14px;
  color: var(--text-2);
  padding: 0;
  margin-bottom: 18px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  font-family: inherit;
  letter-spacing: 0.01em;
}
.back-btn:active { color: var(--text); }
.back-btn::before { content: "←"; font-size: 18px; }
.detail-head {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.anim-big {
  width: 128px;
  height: 128px;
  background: var(--surface-2);
  border-radius: 14px;
  overflow: hidden;
  flex-shrink: 0;
}
.anim-big svg { width: 100%; height: 100%; display: block; }
.detail-info { flex: 1; min-width: 170px; }
.detail-info h2 { font-size: 22px; font-weight: 700; margin: 0 0 6px; line-height: 1.15; letter-spacing: -0.015em; }
.detail-info .reps-big { font-size: 14px; color: var(--accent); font-weight: 600; margin: 0 0 10px; letter-spacing: 0.02em; }
.target { font-size: 13px; color: var(--text-2); margin: 0; line-height: 1.5; }
.target b { color: var(--text); font-weight: 600; }
.det-section { margin-top: 22px; }
.det-section h3 {
  font-size: 11px;
  font-weight: 600;
  margin: 0 0 10px;
  color: var(--text-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
ol.steps { margin: 0; padding: 0; list-style: none; counter-reset: step; }
ol.steps li {
  counter-increment: step;
  position: relative;
  padding: 6px 0 6px 36px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  border-bottom: 1px solid var(--line);
}
ol.steps li:last-child { border-bottom: none; }
ol.steps li::before {
  content: counter(step, decimal-leading-zero);
  position: absolute;
  left: 0;
  top: 8px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
}
ul.mistakes { margin: 0; padding: 0; list-style: none; }
ul.mistakes li {
  position: relative;
  padding: 5px 0 5px 22px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
}
ul.mistakes li::before {
  content: "";
  position: absolute;
  left: 4px;
  top: 13px;
  width: 8px;
  height: 1.5px;
  background: var(--accent);
}
.mark-btn {
  width: 100%;
  margin-top: 26px;
  padding: 14px 16px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-appearance: none;
  transition: all 0.15s;
  font-family: inherit;
}
.mark-btn:active { transform: scale(0.98); }
.mark-btn.done {
  background: var(--done-bg);
  color: var(--done);
}

/* Exercise SVG animations */
.ex { stroke: var(--text); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.ex .filled { fill: var(--text); stroke: none; }
.ex .obj { fill: var(--accent); stroke: none; }
.ex .obj-s { stroke: var(--accent); fill: none; }
.ex .band { stroke: #7F77DD; stroke-dasharray: 3 2; stroke-width: 1.6; fill: none; }
.ex .floor { stroke: var(--text-3); stroke-width: 1.4; }

@keyframes pulse-fade { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
@keyframes row { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-32deg); } }
@keyframes curl { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-65deg); } }
@keyframes press-up { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes swing { 0%,100% { transform: rotate(-55deg); } 50% { transform: rotate(50deg); } }
@keyframes squat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
@keyframes ankle-rot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes finger-open { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-22deg); } }
@keyframes overhead-arc { 0%,100% { transform: rotate(-30deg); } 50% { transform: rotate(115deg); } }
@keyframes twist { 0%,100% { transform: rotate(-22deg); } 50% { transform: rotate(22deg); } }
@keyframes calf-up { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes knee-fwd { 0%,100% { transform: translateX(0); } 50% { transform: translateX(7px); } }
@keyframes wrist-flex { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-30deg); } }
@keyframes pinch { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.65); } }
@keyframes leg-raise { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-32deg); } }
@keyframes side-step { 0%,100% { transform: translateX(0); } 25% { transform: translateX(9px); } 75% { transform: translateX(-9px); } }
@keyframes nail-bend { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-22deg); } }
@keyframes hip-hinge { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-30deg); } }
@keyframes vup { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.55); } }
@keyframes spread-1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-3px,1px); } }
@keyframes spread-2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-2px,-1px); } }
@keyframes spread-3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(0,-2px); } }
@keyframes spread-4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(2px,-1px); } }
@keyframes spread-5 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(3px,1px); } }
@keyframes arch-up { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.7); } }
@keyframes walk-bob { 0%,100% { transform: translate(-4px,0); } 50% { transform: translate(4px,-1px); } }
@keyframes ext-rot { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-40deg); } }
@keyframes pull-apart { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(1.4); } }
@keyframes pushup { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }
@keyframes plank-hold { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
@keyframes face-pull { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-6px); } }
@keyframes massage { 0%,100% { transform: translateX(-3px); } 50% { transform: translateX(3px); } }
@keyframes toe-press { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
@keyframes sleeper { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(35deg); } }
@keyframes lat-stretch { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-10deg); } }
@keyframes lean-fwd { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }
@keyframes hip-push-fwd { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }
@keyframes settle-down { 0%,100% { transform: translateY(0); } 50% { transform: translateY(2px); } }
@keyframes hand-up { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes bd-1 { 0%,40% { opacity: 1; } 50%,100% { opacity: 0.3; } }
@keyframes bd-2 { 0%,40% { opacity: 0.3; } 50%,100% { opacity: 1; } }
@keyframes hold-banana { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
</style>
</head>

<div class="app">
<header>
<div class="top">
<svg class="logo" viewBox="0 0 40 24"><path d="M 1 22 L 8 12 L 13 16 L 19 6"/><path d="M 19 6 L 26 18 L 33 10 L 39 22" class="peak"/></svg>
<h1>Тренировки</h1>
<span class="progress" id="prog"></span>
</div>
<div class="tabs-wrap"><div class="tabs" id="tabs" role="tablist"></div></div>
</header>
<main id="main"></main>
</div>

{ name: 'Tibialis raises у стены', reps: '3×20', tip: 'Поднимай носки максимально', svg: 'tibialis' },

] },
day4: { label: 'День 4', title: 'Тяга горизонталь + хват', meta: '<strong>~25 мин</strong> основная часть', sectionLabel: 'Day 04', items: [

{ name: 'Гнутьё гвоздей', reps: '3–5 попыток', tip: '150 мм (60d), обмотай руки', svg: 'nailBend' },
{ name: 'Pinch grip device', reps: '3×макс по времени', tip: 'Прогрессия — увеличиваем удержание', svg: 'pinchGrip' },
{ name: 'Сгибания запястий с гирей', reps: '3×15', tip: 'Только кисть двигается', svg: 'wristCurl' }
] },
day5: { label: 'День 5', title: 'Ноги + стопы', meta: '<strong>~25 мин</strong> основная часть', sectionLabel: 'Day 05', items: [

{ name: 'Болгарские выпады', reps: '3×10/ногу', tip: 'Задняя нога на стуле', svg: 'bulgarian' },
{ name: 'Single-leg RDL', reps: '3×8/ногу', tip: 'Опорная нога слегка согнута', svg: 'singleLegRDL' },
{ name: 'Подъёмы на носки одной ногой', reps: '4×12, эксцентрик 3 сек', tip: 'Гиря в руке, медленное опускание', svg: 'calfRaise' },
{ name: 'Подъёмы с согнутыми коленями (soleus)', reps: '3×15', tip: 'Сидя или с согнутыми коленями', svg: 'soleusRaise' },
{ name: 'Махи с утяжелителями', reps: '3×12 в каждое направление', tip: 'Бок/спина/назад', svg: 'sideLegRaise' },
{ name: 'Big toe press', reps: '3×10/ногу', tip: 'Большой палец к полу, остальные вверх', svg: 'bigToePress' }
] },

{ name: 'Suitcase carry с гирей', reps: '3×30 м/сторону', tip: 'Корпус не валится', svg: 'suitcase' }
] },
day7: { label: 'День 7', title: 'Йога + восстановление', meta: '<strong>~20 мин</strong>', sectionLabel: 'Day 07', items: [
{ name: 'Йога-флоу', reps: '15 мин', tip: 'YouTube: Yoga With Adriene, Tom Merrick', svg: 'yoga' },

{ name: 'Массаж стопы и предплечий', reps: '2 мин/зону', tip: 'Мяч/бутылка под стопу', svg: 'massage' }
] },

{ name: 'Plantar fascia stretch', reps: '30 сек/стопу', tip: 'Пальцы упёрты в стену, наклонись', svg: 'plantarFascia' },
{ name: 'Икра прямая (gastrocnemius)', reps: '45 сек/ногу', tip: 'Выпад, задняя нога прямая', svg: 'calfStretch' },
{ name: 'Икра согнутая (soleus)', reps: '45 сек/ногу', tip: 'То же, но колено задней ноги согнуто', svg: 'soleusStretch' },
{ name: 'Knee-to-wall', reps: '30 сек/ногу', tip: 'Колено вперёд за носок', svg: 'kneeWall' },

{ name: 'Полотенце за спиной', reps: '30 сек/сторону + поменять', tip: 'Верхняя рука тянет полотенце вверх', svg: 'towelBack' },
{ name: 'Doorway pec', reps: '30 сек/сторону × 2 высоты', tip: 'Локоть выше, потом ниже плеча', svg: 'doorwayPec' },
{ name: 'Lat stretch у стены', reps: '30 сек/сторону', tip: 'Рука вверх, бедро к стене', svg: 'latStretch' }
] }
};

const ORDER = ['warmup','day1','day2','day3','day4','day5','day6','day7','cooldown'];
const CHECK_SVG = '<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

function today() { return new Date().toISOString().slice(0, 10); }

function getDone() {
  try {
    const raw = localStorage.getItem('done-' + today());
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function setDone(d) {
  try { localStorage.setItem('done-' + today(), JSON.stringify(d)); } catch(e) {}
}

function cleanupOldDone() {
  try {
    const t = today();
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('done-') && k !== 'done-' + t) {
        const date = k.slice(5);
        const diff = (new Date(t) - new Date(date)) / 86400000;
        if (diff > 7) localStorage.removeItem(k);
      }
    }
  } catch(e) {}
}

const _dayMap = { 1: 'day1', 2: 'day2', 3: 'day3', 4: 'day4', 5: 'day5', 6: 'day6', 0: 'day7' };
const _autoDay = _dayMap[new Date().getDay()] || 'day1';
let state = { section: _autoDay, view: 'list', idx: null };

function exId(section, i) { return section + '-' + i; }

function totalToday() {
  let total = 0;
  for (const k of ORDER) total += PLAN[k].items.length;
  return total;
}

function renderProgress() {
  const done = getDone();
  const count = Object.values(done).filter(Boolean).length;
  document.getElementById('prog').textContent = count + '/' + totalToday();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = ORDER.map(k =>
    '<button class="tab' + (state.section === k ? ' active' : '') + '" data-key="' + k + '">' + PLAN[k].label + '</button>'
  ).join('');
}

function renderList() {
  const sec = PLAN[state.section];
  const done = getDone();
  const main = document.getElementById('main');
  main.innerHTML =
    '<div class="section-head">' +
    '<div class="section-label">' + sec.sectionLabel + '</div>' +
    '<h2>' + sec.title + '</h2>' +
    '<p class="meta">' + sec.meta + '</p>' +
    '</div>' +
    '<div class="cards">' + sec.items.map((it, i) => {
      const isDone = done[exId(state.section, i)];
      return '<div class="card' + (isDone ? ' done' : '') + '" data-idx="' + i + '">' +
        '<div class="anim">' + (SVG[it.svg] || '') + '</div>' +
        '<div class="body">' +
        '<p class="name">' + it.name + '</p>' +
        '<p class="reps mono">' + it.reps + '</p>' +
        '<p class="tip">' + it.tip + '</p>' +
        '</div>' +
        (isDone ? CHECK_SVG : '<span class="chev">›</span>') +
        '</div>';
    }).join('') + '</div>';
}

function renderDetail() {
  const sec = PLAN[state.section];
  const it = sec.items[state.idx];
  const det = DETAIL[it.svg] || { target: '', steps: [], mistakes: [] };
  const done = getDone();
  const isDone = done[exId(state.section, state.idx)];
  const main = document.getElementById('main');
  main.innerHTML =
    '<button class="back-btn" id="back">' + sec.title + '</button>' +
    '<div class="detail-head">' +
    '<div class="anim-big">' + (SVG[it.svg] || '') + '</div>' +
    '<div class="detail-info">' +
    '<h2>' + it.name + '</h2>' +
    '<p class="reps-big mono">' + it.reps + '</p>' +
    (det.target ? '<p class="target"><b>Цель:</b> ' + det.target + '</p>' : '') +
    '</div></div>' +
    (det.steps.length ? '<div class="det-section"><h3>Как делать</h3><ol class="steps">' + det.steps.map(s => '<li>' + s + '</li>').join('') + '</ol></div>' : '') +
    (det.mistakes.length ? '<div class="det-section"><h3>Типичные ошибки</h3><ul class="mistakes">' + det.mistakes.map(s => '<li>' + s + '</li>').join('') + '</ul></div>' : '') +
    '<button class="mark-btn' + (isDone ? ' done' : '') + '" id="mark">' + (isDone ? '✓ Выполнено сегодня' : 'Отметить выполненным') + '</button>';
}

function render() {
  renderTabs();
  renderProgress();
  if (state.view === 'list') renderList();
  else renderDetail();
  window.scrollTo(0, 0);
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (t) {
    state.section = t.dataset.key;
    state.view = 'list';
    state.idx = null;
    localStorage.setItem('last-section', state.section);
    render();
  }
});

document.getElementById('main').addEventListener('click', e => {
  if (e.target.closest('#back')) {
    state.view = 'list';
    state.idx = null;
    render();
    return;
  }
  if (e.target.closest('#mark')) {
    const done = getDone();
    const id = exId(state.section, state.idx);
    done[id] = !done[id];
    setDone(done);
    render();
    return;
  }
  const card = e.target.closest('.card');
  if (card) {
    state.idx = parseInt(card.dataset.idx);
    state.view = 'detail';
    render();
  }
});

cleanupOldDone();
render();
</script>
